<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三国杀武将抽卡 (新流程)</title>
    <!-- Font Awesome for Lock Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>三国杀武将抽卡模拟器</h1>

    <!-- ==== 视图 1: 设置 ==== -->
    <div id="settings-view">
        <div class="controls-container">
            <h2>1. 选择扩展包 (默认全选)</h2>
            <div id="expansion-packs-list" class="pack-list-container">
                <p>正在加载扩展包列表...</p>
            </div>

            <div class="draw-settings">
                <label for="draw-count-input">2. 一次抽取数量:</label>
                <input type="number" id="draw-count-input" value="5" min="1" max="20"> <!-- Default 5, add max -->

                <button id="initial-draw-button" class="action-button" disabled>3. 开始抽取</button>
            </div>
            <p id="pool-info">请稍候...</p>
        </div>
    </div>

    <!-- ==== 视图 2: 选择卡牌 ==== -->
    <div id="selection-view" class="hidden">
        <div class="selection-container">
            <h2>请选择一张卡牌查看详情 (左右滑动)</h2>
            <div id="selection-carousel" class="card-carousel">
                <!-- 卡牌选项将由 JS 生成 -->
                <p>正在生成卡牌...</p>
            </div>
            <button id="cancel-selection-button" class="secondary-button">返回设置</button>
        </div>
    </div>

    <!-- ==== 视图 3: 确认选择 ==== -->
    <div id="confirmation-view" class="hidden">
         <h2>确认选择这张卡牌吗？</h2>
         <!-- 复用卡牌详情结构，但使用不同 ID -->
         <div class="card-display-area">
             <div id="confirm-card-details" class="card-details-container placeholder" data-faction="">
                 <!-- 内容将由 JS 填充 -->
                  <div class="general-basic-info">
                    <img id="confirm-general-image" src="" alt="武将图片">
                    <div class="general-text-details"> <p id="confirm-general-name">?</p> <div class="general-meta"> <span id="confirm-general-faction">势力: ?</span> | <span id="confirm-general-gender">性别: ?</span> </div> <p id="confirm-general-pack" class="pack-label"></p> </div>
                 </div>
                 <div class="general-skills-section"> <h3>技能:</h3> <ul id="confirm-general-skills-list"> <li>...</li> </ul> </div>
             </div>
         </div>
         <div class="confirmation-buttons">
             <button id="back-to-selection-button" class="secondary-button">返回重选</button>
             <button id="confirm-selection-button" class="action-button">确认选取</button>
         </div>
    </div>


    <!-- ==== 视图 4: 最终展示 ==== -->
    <div id="final-view" class="hidden">
        <div class="final-view-controls">
            <button id="redraw-button" class="secondary-button">重新抽取</button>
            <button id="lock-button" title="锁定卡牌">
                 <i class="fas fa-unlock"></i> <span>解锁</span>
             </button>
        </div>
        <!-- 复用卡牌详情结构，使用不同 ID -->
        <div class="card-display-area large">
            <div id="final-card-details" class="card-details-container placeholder" data-faction="">
                 <!-- 内容将由 JS 填充 -->
                 <div class="general-basic-info">
                    <img id="final-general-image" src="" alt="武将图片">
                    <div class="general-text-details"> <p id="final-general-name">?</p> <div class="general-meta"> <span id="final-general-faction">势力: ?</span> | <span id="final-general-gender">性别: ?</span> </div> <p id="final-general-pack" class="pack-label"></p> </div>
                 </div>
                 <div class="general-skills-section"> <h3>技能:</h3> <ul id="final-general-skills-list"> <li>...</li> </ul> </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
